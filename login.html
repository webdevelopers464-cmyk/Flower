<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Forms</title>
</head>
<style>
    .wrapper{
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f0f0f0;
    }
    .Login{
        border: 1px solid #000;
        width: 400px;
        height: 500px;
        background: url("./images (2).jfif");
        color: white;
        border-radius: 20px;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.75);
        background-size: cover;
        background-position: center;
        overflow: hidden;
    }
    form{
        display: block;
        box-sizing: border-box;
        padding: 40px;
        width: 100%;
        height: 100%;
        backdrop-filter: brightness(40%);
        flex-direction: column;
        display: flex;
    }

    h1{
        font-weight: normal;
       font-size: 24px;
       text-shadow: 0px 0px 2px rgba(0, 0, 0, 0.5);
       margin-bottom: 60px;
    }

    label{
        color: rgba(255, 255, 255, 0.8);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 2px;
        padding-left: 10px;
    }

    input{
        background: rgba(255, 255, 255, 0.3);
        height: 40px;
        line-height: 40px;
        border-radius: 20px;
        padding: 0 20px;
        border: none;
        margin-bottom: 20px;
        color: white;
    }

   input:focus{
        outline: none;
        box-shadow: 0px 0px 5px rgba(255, 255, 255, 0.6);
    }

    button{
        background: rgb(45, 126, 231);
        height: 40px;
        line-height: 40px;
        border-radius: 40px;
        border: none;
        margin: 10px 0px;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.3);
        color: white;
        width: 300px;
    }
</style>
<body>
    <div class="wrapper">
        <div class="Login">
        <form>
            <h1>LOG IN</h1>
            <label type="text">

               <label>Username</label>
               <input type="text">
               <label>Password</label>
               <input type="password">
               <button>Submit</button>
            </label>
        </form>
    </div>
    </div>
</body>
</html>
