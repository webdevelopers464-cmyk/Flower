<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transitions</title>
    <link rel="icon" href="logo.png">

<style>
    body
    {
        background: #ececec;
    }
    .im
    {
        width: 100px;
        border: 2px solid rgb(245, 245, 245);
        border-radius: 50%;
    }
    .parent
    {
        display: flex;
        justify-content: space-around;
        width: 100%;
        height: 50px;
        align-items: center;
        background: #fa53af;
        color: #fff;
        margin-bottom: 4px;
    }
    .container
    {
        display: flex;
        justify-content: space-around;
        align-items: center;
        background: #5f0909;
        color: #fff;
        margin-bottom: 4px;
    }
    #main
    {
        font-size: larger;
        flex-grow: .5;
    }
    .vintage
    {
        display: flex;
        justify-content: center;
        flex-direction: row;
    }
    h1
    {
        display: flex;
        justify-content: center;
    }
    .img1
    {
        width: 170px;
        height: 270px;
        margin: 10px;
        border-radius: 10px;
        border: 2px solid ececec;
        box-shadow: 0 0 20px 2px rgba(0, 0, 0, .1);
    }
    .img
    {
        transition: 1s;
    }
    .img1 img
    {
        display: block;
        width: 100%;
        border-radius: 5px;
    }
    .img:hover{
        transform: scale(1.3);
        z-index: 2;
    }
     #preloader
  {
    background: #000 url("./Spinner@1x-1.0s-200px-200px.gif") no-repeat center center; 
    /* background-size: 60%; */
    height: 100vh;
    width: 100%;
    position: fixed;
    z-index: 100;
    overflow: visible;
  }
  .footer
  {
    background: #7c3f3f;
    display: flex;
    justify-content: space-around;
  }
  a
  {
    color: #fff;
  }
  h1, h2, h3, .child
  {
    cursor: pointer;
  }
  .ck
  {
    display: flex;
    flex-direction: column;
    padding: 10px;
  }
</style>
<body>
    <div id="preloader"></div>

    <iframe width="0.5px" height="1px" src="https://www.youtube.com/embed/KVbrHTRxgsk" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
